{% extends "base.html" %}
{% block title %}Login — Flowers Films{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-txt">Flowers <em>Films</em></div>
      <p>Acesso administrativo</p>
    </div>
    {% if erro %}<div class="login-erro">{{ erro }}</div>{% endif %}
    <form method="POST">
      <div class="fg" style="margin-bottom:12px">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);font-weight:600">Usuário</label>
        <input type="text" name="usuario" placeholder="Seu usuário" required autofocus
          style="background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--txt);padding:11px 14px;font-size:13px;font-family:'Archivo',sans-serif;outline:none;width:100%;margin-top:5px">
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);font-weight:600">Senha</label>
        <input type="password" name="senha" placeholder="Sua senha" required
          style="background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--txt);padding:11px 14px;font-size:13px;font-family:'Archivo',sans-serif;outline:none;width:100%;margin-top:5px">
      </div>
      <button type="submit" class="btn-pk btn-full">Entrar</button>
    </form>
    <div style="text-align:center;margin-top:16px">
      <a href="{{ url_for('index') }}" style="font-size:12px;color:var(--txt2)">← Voltar ao site</a>
    </div>
  </div>
</div>
{% endblock %}
